name: PR Validation (MUSA GPU)

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
 
permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: [self-hosted, musa-gpu]
     
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
 
      # 2. 将拉取到的代码拷贝到那个一直运行的容器中
      # 使用 github.run_id 创建独立目录，防止多次 PR 测试时的代码互相冲突
      - name: Copy code into running container
        run: |
          PR_PATH="/home/runner/pr_test_${{ github.run_id }}"
          docker exec Runner mkdir -p /home/runner/pr_test_${{ github.run_id }}
          docker cp . Runner:/home/runner/pr_test_${{ github.run_id }}
          echo "✅ Code copied to container path: $PR_PATH"
 
      # 4. 进入容器并验证 MUSA 设备
      - name: Verify MUSA device availability
        run: |
          docker exec -i Runner bash <<'EOF'
          # 激活你想要的环境，比如 runner
          source ~/miniconda/bin/activate runner

          # 打印当前环境
          echo "🌟 Current conda environment: $(conda info --envs | grep '*' | awk '{print $1}')"

          # Python 多行检查
          python3 <<PYEOF
          print("TensorFlow version:", tf.__version__)
          PYEOF
          EOF

      # 5. 进入容器跑单元测试（已修复原脚本中状态输出覆盖的隐藏 Bug）
      - name: Run unit tests
        id: run-tests
        run: |
          if docker exec Runner bash -c "cd /home/runner/pr_test_${{ github.run_id }} && python -m pytest tests/unit/ -v --tb=short"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
 
      # 6. 进入容器跑集成测试
      # - name: Run integration tests (MUSA operators)
      #   id: run-integration
      #   if: steps.run-tests.outputs.status == 'success'
      #   run: |
      #     if docker exec Runner bash -c "cd /home/runner/pr_test_${{ github.run_id }} && python -m pytest tests/integration/ -v --tb=short"; then
      #       echo "status=success" >> $GITHUB_OUTPUT
      #     else
      #       echo "status=failure" >> $GITHUB_OUTPUT
      #     fi
      #   continue-on-error: true

      # 🌟 7. 收尾清理工作（非常重要！）
      # 因为容器不会销毁，为了防止把容器磁盘塞满，测试跑完后必须把这次拷贝进去的代码删掉
      - name: Clean up container workspace
        if: always() # 确保即使前面的测试失败了，也会执行清理步骤
        run: |
          docker exec Runner rm -rf /home/runner/pr_test_${{ github.run_id }}
 
      # 8. GitHub 评论 (成功)
      - name: Comment PR with result (success)
        if: steps.run-integration.outputs.status == 'success'
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner,
              repo,
              body: `✅ **CI Passed**\n\n- MUSA device: detected\n- Unit tests: passed\n- Integration tests: passed\n\n[View logs](${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId})`
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner,
              repo,
              labels: ['ci-passed']
            });
 
      # 9. GitHub 评论 (失败)
      - name: Comment PR with result (failure)
        if: steps.run-integration.outputs.status == 'failure' || steps.run-tests.outputs.status == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner,
              repo,
              body: `❌ **CI Failed**\n\nPlease check:\n1. MUSA device availability\n2. Operator compatibility\n3. Test logs below\n\n[View logs](${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId})`
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner,
              repo,
              labels: ['ci-failed']
            });